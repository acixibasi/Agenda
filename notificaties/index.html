<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roostercoach - notificaties</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #64748b;
      --border: #d8e0e8;
      --attention: #a15c00;
      --attention-bg: #fff4df;
      --conflict: #a32020;
      --conflict-bg: #ffe8e8;
      --ok: #1f7a4d;
      --ok-bg: #e8f6ef;
      --focus: #1c5d99;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
    }

    button,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 11px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--focus);
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    .muted {
      color: var(--muted);
      font-size: 0.93rem;
    }

    .toolbar,
    .filters,
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .filters {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .filters select {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      background: #fff;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric,
    .notice-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .metric {
      padding: 12px;
    }

    .metric strong {
      display: block;
      font-size: 1.4rem;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .notice-card {
      overflow: hidden;
    }

    .notice-card[data-severity="conflict"] {
      border-left: 5px solid var(--conflict);
    }

    .notice-card[data-severity="aandacht"] {
      border-left: 5px solid var(--attention);
    }

    .notice-head {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      border: 0;
      border-radius: 0;
      padding: 12px;
      text-align: left;
      background: var(--panel);
    }

    .notice-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .notice-title strong {
      overflow-wrap: anywhere;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .pill-conflict {
      color: var(--conflict);
      background: var(--conflict-bg);
    }

    .pill-aandacht {
      color: var(--attention);
      background: var(--attention-bg);
    }

    .pill-ok {
      color: var(--ok);
      background: var(--ok-bg);
    }

    .notice-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px;
      gap: 12px;
    }

    .notice-card.open .notice-body {
      display: grid;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .detail-box {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px;
      background: #fbfcfd;
    }

    .detail-box span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 2px;
    }

    .save-state {
      min-height: 1.4em;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      header,
      .notice-head {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
      }

      .summary,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .notice-head {
        justify-items: start;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Actuele aandacht en conflicten</h1>
        <p class="muted" id="data-status">Lokale roosterdata laden...</p>
      </div>
      <div class="toolbar">
        <button type="button" id="refresh-button">Ververs</button>
        <button type="button" id="open-main-button">Open roostercoach</button>
      </div>
    </header>

    <section class="filters" aria-label="Filters">
      <label>
        Maand
        <select id="month-filter"></select>
      </label>
      <label>
        Type
        <select id="severity-filter">
          <option value="all">Alles</option>
          <option value="conflict">Conflicten</option>
          <option value="attention">Aandacht</option>
        </select>
      </label>
      <label>
        Notitie
        <select id="note-filter">
          <option value="all">Alles</option>
          <option value="without-note">Zonder vrije tekst</option>
          <option value="with-note">Met vrije tekst</option>
        </select>
      </label>
    </section>

    <section class="summary" aria-label="Samenvatting">
      <div class="metric"><span class="muted">Actueel</span><strong id="metric-total">0</strong></div>
      <div class="metric"><span class="muted">Conflicten</span><strong id="metric-conflicts">0</strong></div>
      <div class="metric"><span class="muted">Aandacht</span><strong id="metric-attention">0</strong></div>
    </section>

    <section class="list" id="notice-list" aria-live="polite"></section>
  </main>

  <script>
    "use strict";

    const STORAGE_KEY = "roostercoach.data.v1";
    const OPEN_STATUSES = new Set(["", "open", undefined, null]);
    const ATTENTION_SEVERITIES = new Set(["aandacht", "waarschuwing", "keuze_nodig"]);
    const ACTIVE_SEVERITIES = new Set(["conflict", ...ATTENTION_SEVERITIES]);
    const MONTH_NAMES = [
      "januari", "februari", "maart", "april", "mei", "juni",
      "juli", "augustus", "september", "oktober", "november", "december"
    ];

    const elements = {
      status: document.getElementById("data-status"),
      monthFilter: document.getElementById("month-filter"),
      severityFilter: document.getElementById("severity-filter"),
      noteFilter: document.getElementById("note-filter"),
      list: document.getElementById("notice-list"),
      metricTotal: document.getElementById("metric-total"),
      metricConflicts: document.getElementById("metric-conflicts"),
      metricAttention: document.getElementById("metric-attention"),
      refreshButton: document.getElementById("refresh-button"),
      openMainButton: document.getElementById("open-main-button")
    };

    let currentData = null;
    let currentItems = [];

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        currentData = null;
        currentItems = [];
        render();
        return;
      }

      try {
        currentData = JSON.parse(raw);
        currentItems = getActiveFindings(currentData);
        render();
      } catch (error) {
        currentData = null;
        currentItems = [];
        elements.status.textContent = "Lokale data kon niet gelezen worden.";
        elements.list.innerHTML = `<div class="empty">Controleer de lokale opslag of open eerst de hoofdapp.</div>`;
      }
    }

    function getActiveFindings(data) {
      const analyses = Array.isArray(data?.analyseResultaten) ? data.analyseResultaten : [];
      return analyses
        .filter((item) => ACTIVE_SEVERITIES.has(item.ernst))
        .filter((item) => OPEN_STATUSES.has(item.actieStatus || "open"))
        .sort(sortFindings);
    }

    function sortFindings(a, b) {
      const severity = severityRank(a.ernst) - severityRank(b.ernst);
      if (severity) return severity;
      const date = String(a.datum || "").localeCompare(String(b.datum || ""));
      if (date) return date;
      return String(a.melding || "").localeCompare(String(b.melding || ""));
    }

    function severityRank(value) {
      return value === "conflict" ? 0 : 1;
    }

    function render() {
      renderMonthOptions();
      const filtered = getFilteredItems();
      const conflicts = filtered.filter((item) => item.ernst === "conflict").length;
      const attention = filtered.filter((item) => ATTENTION_SEVERITIES.has(item.ernst)).length;

      elements.metricTotal.textContent = String(filtered.length);
      elements.metricConflicts.textContent = String(conflicts);
      elements.metricAttention.textContent = String(attention);

      if (!currentData) {
        elements.status.textContent = "Geen lokale roosterdata gevonden.";
        elements.list.innerHTML = `<div class="empty">Open eerst de hoofdapp en maak of importeer een maand.</div>`;
        return;
      }

      const lastModified = currentData.lastModified ? `Laatst opgeslagen: ${formatDateTime(currentData.lastModified)}` : "Lokale data geladen.";
      elements.status.textContent = `${lastModified} Opslag: ${STORAGE_KEY}`;

      if (!filtered.length) {
        elements.list.innerHTML = `<div class="empty">Geen actuele aandachtspunten of conflicten binnen deze filters.</div>`;
        return;
      }

      elements.list.innerHTML = filtered.map(renderFindingCard).join("");
    }

    function renderMonthOptions() {
      const selected = elements.monthFilter.value || "all";
      const months = [...new Set(currentItems.map((item) => getMonthId(item)).filter(Boolean))].sort();
      elements.monthFilter.innerHTML = [
        `<option value="all">Alle maanden</option>`,
        ...months.map((monthId) => `<option value="${escapeHtml(monthId)}">${escapeHtml(formatMonthLabel(monthId))}</option>`)
      ].join("");
      elements.monthFilter.value = months.includes(selected) ? selected : "all";
    }

    function getFilteredItems() {
      const monthValue = elements.monthFilter.value || "all";
      const severityValue = elements.severityFilter.value || "all";
      const noteValue = elements.noteFilter.value || "all";
      return currentItems.filter((item) => {
        const monthMatches = monthValue === "all" || getMonthId(item) === monthValue;
        const severityMatches = severityValue === "all" ||
          item.ernst === severityValue ||
          (severityValue === "attention" && ATTENTION_SEVERITIES.has(item.ernst));
        const hasNote = Boolean(String(item.afdekNotitie || "").trim());
        const noteMatches = noteValue === "all" ||
          (noteValue === "with-note" && hasNote) ||
          (noteValue === "without-note" && !hasNote);
        return monthMatches && severityMatches && noteMatches;
      });
    }

    function renderFindingCard(item) {
      const note = String(item.afdekNotitie || "");
      const hasNote = note.trim().length > 0;
      const dateLabel = item.datum ? formatLongDate(item.datum) : formatMonthLabel(item.maandPlanningId || "");
      const severityLabel = item.ernst === "conflict" ? "Conflict" : "Aandacht";
      const severityClass = item.ernst === "conflict" ? "conflict" : "aandacht";
      return `
        <article class="notice-card" data-id="${escapeHtml(item.id)}" data-severity="${escapeHtml(severityClass)}">
          <button type="button" class="notice-head" data-toggle="${escapeHtml(item.id)}">
            <span class="pill pill-${escapeHtml(severityClass)}">${escapeHtml(severityLabel)}</span>
            <span class="notice-title">
              <strong>${escapeHtml(item.melding || "Analysepunt")}</strong>
              <span class="muted">${escapeHtml(dateLabel)} - ${escapeHtml(formatCodeLabel(item.categorie || "algemeen"))}</span>
            </span>
            <span class="pill ${hasNote ? "pill-ok" : "pill-aandacht"}">${hasNote ? "Tekst" : "Open"}</span>
          </button>
          <div class="notice-body">
            <div class="detail-grid">
              <div class="detail-box">
                <span>Advies</span>
                ${escapeHtml(item.advies || "Geen adviesregel opgeslagen.")}
              </div>
              <div class="detail-box">
                <span>Regel</span>
                ${escapeHtml(item.regelId || "")}
              </div>
              <div class="detail-box">
                <span>Datum</span>
                ${escapeHtml(dateLabel)}
              </div>
              <div class="detail-box">
                <span>Status</span>
                ${escapeHtml(item.actieStatus || "open")}
              </div>
            </div>
            <label>
              Vrije tekst
              <textarea data-note="${escapeHtml(item.id)}" placeholder="Wat is afgesproken, gecontroleerd of nog uit te zoeken?">${escapeHtml(note)}</textarea>
            </label>
            <div class="actions">
              <button type="button" data-save-note="${escapeHtml(item.id)}">Notitie opslaan</button>
              <button type="button" data-cover-note="${escapeHtml(item.id)}">Opslaan en afdekken</button>
              <button type="button" data-open-day="${escapeHtml(item.datum || "")}">Open dag in hoofdapp</button>
              <span class="save-state" data-save-state="${escapeHtml(item.id)}"></span>
            </div>
          </div>
        </article>
      `;
    }

    function saveNote(id, closeAfterSave) {
      const item = findAnalysis(id);
      const field = document.querySelector(`[data-note="${cssEscape(id)}"]`);
      if (!item || !field || !currentData) return;

      item.afdekNotitie = field.value.trim();
      if (closeAfterSave) {
        if (!item.afdekNotitie) {
          setSaveState(id, "Vul eerst vrije tekst in voordat je afdekt.", true);
          return;
        }
        item.actieStatus = "afgedekt";
        item.afgedektOp = new Date().toISOString();
      }
      item.laatstBijgewerkt = new Date().toISOString();
      persistData(closeAfterSave ? "notificatie_afgedekt_via_lijst" : "notitie_bij_analysepunt");
      setSaveState(id, closeAfterSave ? "Opgeslagen en afgedekt." : "Notitie opgeslagen.", false);
      currentItems = getActiveFindings(currentData);
      if (closeAfterSave) render();
    }

    function persistData(reason) {
      const now = new Date().toISOString();
      currentData.lastModified = now;
      currentData.lastModifiedBy = "notificaties";
      currentData.revisionId = `rev_${now.replace(/[:.]/g, "-")}`;
      if (!Array.isArray(currentData.wijzigingsLog)) currentData.wijzigingsLog = [];
      currentData.wijzigingsLog.push({
        id: `log_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`,
        tijd: now,
        type: reason,
        entiteitType: "AnalyseResultaat",
        entiteitId: "",
        samenvatting: reason.replaceAll("_", " "),
        bron: "notificaties"
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
    }

    function findAnalysis(id) {
      return (currentData?.analyseResultaten || []).find((item) => item.id === id);
    }

    function setSaveState(id, message, isError) {
      const element = document.querySelector(`[data-save-state="${cssEscape(id)}"]`);
      if (!element) return;
      element.textContent = message;
      element.style.color = isError ? "var(--conflict)" : "var(--ok)";
    }

    function openMainApp(dateValue) {
      const target = dateValue ? `../index.html#${encodeURIComponent(dateValue)}` : "../index.html";
      window.location.href = target;
    }

    function getMonthId(item) {
      return item.maandPlanningId || String(item.datum || "").slice(0, 7);
    }

    function formatMonthLabel(monthId) {
      const match = String(monthId || "").match(/^(\d{4})-(\d{2})$/);
      if (!match) return monthId || "Onbekend";
      return `${MONTH_NAMES[Number(match[2]) - 1]} ${match[1]}`;
    }

    function formatLongDate(value) {
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("nl-NL", {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: "numeric"
      }).format(date);
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("nl-NL", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function formatCodeLabel(value) {
      return String(value || "")
        .replaceAll("_", " ")
        .replace(/\b\w/g, (letter) => letter.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    document.addEventListener("click", (event) => {
      const toggle = event.target.closest("[data-toggle]");
      if (toggle) {
        toggle.closest(".notice-card")?.classList.toggle("open");
        return;
      }

      const saveButton = event.target.closest("[data-save-note]");
      if (saveButton) {
        saveNote(saveButton.dataset.saveNote, false);
        return;
      }

      const coverButton = event.target.closest("[data-cover-note]");
      if (coverButton) {
        saveNote(coverButton.dataset.coverNote, true);
        return;
      }

      const openDayButton = event.target.closest("[data-open-day]");
      if (openDayButton) {
        openMainApp(openDayButton.dataset.openDay);
      }
    });

    elements.refreshButton.addEventListener("click", loadData);
    elements.openMainButton.addEventListener("click", () => openMainApp(""));
    elements.monthFilter.addEventListener("change", render);
    elements.severityFilter.addEventListener("change", render);
    elements.noteFilter.addEventListener("change", render);
    window.addEventListener("storage", (event) => {
      if (event.key === STORAGE_KEY) loadData();
    });

    loadData();
  </script>
</body>
</html>
