name: Deploy to webserver

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SFTP helper
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload site to webserver
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
          SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
        run: |
          set -euo pipefail

          if [ -z "${SFTP_HOST}" ] || [ -z "${SFTP_USER}" ] || [ -z "${SFTP_PASSWORD}" ] || [ -z "${SFTP_REMOTE_DIR}" ]; then
            echo "Missing one or more required GitHub Secrets."
            exit 1
          fi

          export SSHPASS="${SFTP_PASSWORD}"

          echo "Starting SFTP upload to configured webserver."
          echo "Remote directory: ${SFTP_REMOTE_DIR}"

          sshpass -e sftp \
            -oBatchMode=no \
            -oPreferredAuthentications=password \
            -oPubkeyAuthentication=no \
            -oStrictHostKeyChecking=accept-new \
            -P "${SFTP_PORT}" \
          "${SFTP_USER}@${SFTP_HOST}" <<SFTP_COMMANDS
          -mkdir ${SFTP_REMOTE_DIR}
          cd ${SFTP_REMOTE_DIR}
          put index.html
          put style.css
          put config.js
          put school.js
          put storage.js
          put settings.js
          put entries.js
          put analysis.js
          put app.js
          put -r root/agenda
          put -r docs
          bye
          SFTP_COMMANDS
